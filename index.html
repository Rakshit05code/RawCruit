// ══ NEURAL CANVAS ══
function NeuralCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    resize();
    window.addEventListener('resize', resize);
    let W = () => canvas.width, H = () => canvas.height;
    let animId;
    const nodes = Array.from({ length: 55 }, () => ({
      x: Math.random()*W(), y: Math.random()*H(),
      vx: (Math.random()-0.5)*0.45, vy: (Math.random()-0.5)*0.45,
      r: Math.random()*2+1, pulse: Math.random()*Math.PI*2, ps: 0.018+Math.random()*0.018,
    }));
    let mouse = { x: W()/2, y: H()/2 };
    const onMove = e => { const r = canvas.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; };
    canvas.addEventListener("mousemove", onMove);
    const draw = () => {
      ctx.clearRect(0,0,W(),H());
      nodes.forEach(n => {
        n.x+=n.vx; n.y+=n.vy; n.pulse+=n.ps;
        if(n.x<0||n.x>W()) n.vx*=-1; if(n.y<0||n.y>H()) n.vy*=-1;
        const dx=n.x-mouse.x, dy=n.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<120&&d>0){n.vx+=(dx/d)*0.05; n.vy+=(dy/d)*0.05;}
        const spd=Math.sqrt(n.vx*n.vx+n.vy*n.vy);
        if(spd>1.1){n.vx=(n.vx/spd)*1.1; n.vy=(n.vy/spd)*1.1;}
      });
      for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<140){ const a=(1-dist/140)*0.18; ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.strokeStyle=`rgba(30,100,255,${a})`; ctx.lineWidth=0.7; ctx.stroke(); }
      }
      nodes.forEach(n=>{
        const g=(Math.sin(n.pulse)+1)/2, rad=n.r*(1+g*0.4), a=0.38+g*0.38;
        const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,rad);
        ng.addColorStop(0,`rgba(120,180,255,${a})`); ng.addColorStop(1,`rgba(30,100,255,${a*0.3})`);
        ctx.beginPath(); ctx.arc(n.x,n.y,rad,0,Math.PI*2); ctx.fillStyle=ng; ctx.fill();
      });
      animId=requestAnimationFrame(draw);
    };
    draw();
    return ()=>{ cancelAnimationFrame(animId); canvas.removeEventListener("mousemove",onMove); window.removeEventListener('resize',resize); };
  }, []);
  return <canvas ref={canvasRef} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}} />;
}

// ══ RADAR CHART ══
function RadarChart({ scores, size=160 }) {
  const labels=["Semantic","Exp","Intent","Velocity","Culture"];
  const vals=scores||[0.89,0.92,0.85,0.91,0.78];
  const cx=size/2, cy=size/2, r=size*0.34;
  const pts=labels.map((_,i)=>{
    const a=(i/labels.length)*Math.PI*2-Math.PI/2, v=vals[i];
    return {x:cx+Math.cos(a)*r*v, y:cy+Math.sin(a)*r*v, lx:cx+Math.cos(a)*(r+22), ly:cy+Math.sin(a)*(r+22)};
  });
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:"visible"}}>
      {[0.25,0.5,0.75,1].map((lvl,gi)=>{
        const gp=labels.map((_,i)=>{const a=(i/labels.length)*Math.PI*2-Math.PI/2; return `${cx+Math.cos(a)*r*lvl},${cy+Math.sin(a)*r*lvl}`;}).join(" ");
        return <polygon key={gi} points={gp} fill={lvl===1?"rgba(30,100,255,0.03)":"none"} stroke="rgba(30,100,255,0.13)" strokeWidth="1"/>;
      })}
      {labels.map((_,i)=>{const a=(i/labels.length)*Math.PI*2-Math.PI/2; return <line key={i} x1={cx} y1={cy} x2={cx+Math.cos(a)*r} y2={cy+Math.sin(a)*r} stroke="rgba(30,100,255,0.12)" strokeWidth="1"/>;} )}
      <polygon points={poly} fill="rgba(30,100,255,0.12)" stroke="#1e64ff" strokeWidth="1.8"/>
      {pts.map((p,i)=><g key={i}><circle cx={p.x} cy={p.y} r={4} fill="#1e64ff"/><circle cx={p.x} cy={p.y} r={8} fill="rgba(30,100,255,0.12)"/></g>)}
      {pts.map((p,i)=><text key={i} x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle" fontSize="7.5" fill="#4a6090" fontWeight="700">{labels[i]}</text>)}
    </svg>
  );
}

// ══ SCORE RING ══
function ScoreRing({ score, size=56 }) {
  const r=(size-8)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r, dash=circ*(score/100);
  const id=`rg_${score}_${size}`;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs><linearGradient id={id} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#1e64ff"/><stop offset="100%" stopColor="#60b0ff"/></linearGradient></defs>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(30,100,255,0.09)" strokeWidth="4"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={`url(#${id})`} strokeWidth="4" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={circ*0.25} strokeLinecap="round"/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize={size>50?"11":"9"} fill="#1e64ff" fontWeight="800">{score}%</text>
    </svg>
  );
}

// ══ ANIMATED COUNTER ══
function Counter({ to, suffix="" }) {
  const [val,setVal]=useState(0), ref=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting)return; obs.disconnect();
      const start=performance.now();
      const tick=now=>{ const p=Math.min((now-start)/1400,1), ease=1-Math.pow(1-p,4); setVal(Math.round(ease*to)); if(p<1)requestAnimationFrame(tick); };
      requestAnimationFrame(tick);
    },{threshold:0.3});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[to]);
  return <span ref={ref}>{val}{suffix}</span>;
}

// ══ TYPEWRITER ══
function TypeWriter({ texts, speed=65 }) {
  const [idx,setIdx]=useState(0), [text,setText]=useState(""), [del,setDel]=useState(false);
  useEffect(()=>{
    const cur=texts[idx];
    const t=setTimeout(()=>{
      if(!del){ if(text.length<cur.length){setText(cur.slice(0,text.length+1));} else{setTimeout(()=>setDel(true),1800);} }
      else{ if(text.length>0){setText(text.slice(0,-1));} else{setDel(false);setIdx(i=>(i+1)%texts.length);} }
    }, del?speed/2:speed);
    return()=>clearTimeout(t);
  },[text,del,idx,texts,speed]);
  return <span style={{color:"#1e64ff"}}>{text}<span style={{animation:"blink 1s step-end infinite",color:"#1e64ff"}}>|</span></span>;
}

// ══ SKILL BAR ══
function SkillBar({ label, value }) {
  const [w,setW]=useState(0), ref=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{ if(e.isIntersecting){setW(value*100);obs.disconnect();} },{threshold:0.2});
    if(ref.current)obs.observe(ref.current); return()=>obs.disconnect();
  },[value]);
  return (
    <div ref={ref} style={{marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:10.5,color:"#4a6090",fontWeight:600}}>{label}</span>
        <span style={{fontSize:10.5,color:"#1e64ff",fontWeight:700}}>{Math.round(value*100)}%</span>
      </div>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${w}%`}}/></div>
    </div>
  );
}

// ══ MINI BAR CHART ══
function MiniBar({ data, height=90, color="#1e64ff" }) {
  const max = Math.max(...data.map(d=>d.v));
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height,paddingBottom:18,position:"relative"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%",justifyContent:"flex-end"}}>
          <div style={{fontSize:8.5,color,fontWeight:700}}>{d.v}</div>
          <div style={{width:"100%",height:`${(d.v/max)*80}%`,minHeight:4,borderRadius:"4px 4px 0 0",background:`linear-gradient(0deg,${color},${color}99)`,transition:"height 0.8s ease",cursor:"default"}}
            title={`${d.l}: ${d.v}`}/>
          <div style={{fontSize:8,color:"#7090c0",textAlign:"center",lineHeight:1.2,position:"absolute",bottom:0}}>{d.l}</div>
        </div>
      ))}
    </div>
  );
}

// ══ DONUT CHART ══
function DonutChart({ segments, size=100, thickness=16 }) {
  const r=size/2-thickness/2, circ=2*Math.PI*r;
  let offset=0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {segments.map((seg,i)=>{
        const dash=circ*seg.p, gap=circ*(1-seg.p);
        const el=<circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.c} strokeWidth={thickness} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-circ*offset} strokeLinecap="butt"/>;
        offset+=seg.p;
        return el;
      })}
    </svg>
  );
}

// ══ CANDIDATE CARD ══
function CandCard({ c, rank, onClick, sel, starred, onStar, compareMode, onCompare, inCompare }) {
  const selected = sel?.id===c.id;
  return (
    <div onClick={()=>onClick(c)} style={{background:selected?"rgba(30,100,255,0.07)":"rgba(255,255,255,0.75)",backdropFilter:"blur(20px)",border:selected?"1.5px solid rgba(30,100,255,0.45)":"1.5px solid rgba(30,100,255,0.1)",borderRadius:16,padding:"15px 17px",cursor:"pointer",position:"relative",overflow:"hidden",transition:"all 0.22s cubic-bezier(0.16,1,0.3,1)",boxShadow:selected?"0 8px 32px rgba(30,100,255,0.16)":"0 2px 10px rgba(30,100,255,0.04)",animation:`slideUp 0.4s ease ${rank*0.055}s both`}}>
      <div style={{position:"absolute",top:-1,left:-1,background:rank===0?"linear-gradient(135deg,#f59e0b,#fbbf24)":rank===1?"linear-gradient(135deg,#94a3b8,#cbd5e1)":rank===2?"linear-gradient(135deg,#b45309,#d97706)":"rgba(30,100,255,0.09)",color:rank<3?"#fff":"#1e64ff",fontSize:9,fontWeight:800,padding:"3px 10px",borderRadius:"14px 0 8px 0",letterSpacing:0.4}}>#{rank+1}</div>
      <div style={{position:"absolute",top:8,right:10,display:"flex",gap:6,zIndex:2}}>
        {compareMode&&<div onClick={e=>{e.stopPropagation();onCompare(c);}} style={{width:18,height:18,borderRadius:4,border:`2px solid ${inCompare?"#1e64ff":"rgba(30,100,255,0.3)"}`,background:inCompare?"#1e64ff":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",transition:"all 0.15s"}}>{inCompare?"✓":""}</div>}
        <div onClick={e=>{e.stopPropagation();onStar(c.id);}} style={{fontSize:14,cursor:"pointer",lineHeight:1,opacity:starred?"1":"0.35",transition:"opacity 0.2s"}}>{starred?"⭐":"☆"}</div>
      </div>
      <div style={{display:"flex",gap:11,alignItems:"flex-start",paddingTop:5}}>
        <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${c.color},${c.color}88)`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13,flexShrink:0,boxShadow:`0 4px 12px ${c.color}33`}}>{c.initials}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:13,color:"#0f1a2e",marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
          <div style={{fontSize:10.5,color:"#4a6090",marginBottom:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.title} · {c.company}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
            {c.matched.map(s=><span key={s} className="tag" style={{background:"rgba(30,100,255,0.08)",color:"#1e64ff",border:"1px solid rgba(30,100,255,0.18)"}}>✓ {s}</span>)}
            {c.skills.filter(s=>!c.matched.includes(s)).slice(0,2).map(s=><span key={s} className="tag" style={{background:"rgba(100,130,180,0.06)",color:"#7090c0",border:"1px solid rgba(100,130,180,0.12)"}}>{s}</span>)}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <ScoreRing score={c.score} size={48}/>
          <span className="tag" style={{background:`${IC[c.intent]}11`,color:IC[c.intent],border:`1px solid ${IC[c.intent]}26`,fontSize:9}}>{IL[c.intent]}</span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"3px 8px",marginTop:9}}>
        {["Semantic","Experience","Career"].map((l,i)=>(
          <div key={l}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{fontSize:8,color:"#7090c0",fontWeight:600}}>{l}</span>
              <span style={{fontSize:8,color:"#1e64ff",fontWeight:700}}>{Math.round(c.scores[i]*100)}%</span>

            <div className="progress-bar" style={{height:2.5}}><div style={{height:"100%",width:`${c.scores[i]*100}%`,background:"linear-gradient(90deg,#1e64ff,#60b0ff)",borderRadius:2}}/></div>

  );
}

// ══ ADD CANDIDATE MODAL ══
function AddCandModal({ onAdd, onClose }) {
  const [form,setForm] = useState({name:"",title:"",company:"",loc:"",exp:"",skills:"",salary:"",availability:"Immediate",intent:"warm"});
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const inp = {width:"100%",padding:"8px 11px",border:"1.5px solid rgba(30,100,255,0.15)",borderRadius:9,fontSize:12,color:"#0f1a2e",background:"rgba(30,100,255,0.02)",marginBottom:10};
  const handleAdd = () => {
    if(!form.name||!form.title) return;
    const skillArr = form.skills.split(",").map(s=>s.trim()).filter(Boolean);
    const newC = {
      id:`c${Date.now()}`,name:form.name,title:form.title,company:form.company||"Independent",loc:form.loc||"Remote",
      exp:parseInt(form.exp)||1,score:Math.round(60+Math.random()*30),
      skills:skillArr.length?skillArr:["General"],matched:skillArr.slice(0,2),
      intent:form.intent,scores:[Math.random()*0.3+0.65,Math.random()*0.3+0.65,Math.random()*0.3+0.6,Math.random()*0.3+0.65,Math.random()*0.3+0.65],
      initials:form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),
      color:["#1e64ff","#0a52d4","#2078e8","#1a5cd1","#0d4bb5"][Math.floor(Math.random()*5)],
      strengths:["Strong profile match","Relevant background"],notes:["Newly added — review pending"],
      availability:form.availability,salary:form.salary||"—",location:form.loc||"Remote",status:"active"
    };
    onAdd(newC);
    onClose();
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:16,color:"#0f1a2e"}}>➕ Add Candidate</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#7090c0"}}>✕</button>
        </div>
        {[["name","Full Name *"],["title","Job Title *"],["company","Company"],["loc","Location"],["exp","Years of Experience"],["skills","Skills (comma-separated)"],["salary","Expected Salary"],["availability","Availability"]].map(([k,lbl])=>(
          <div key={k}>
            <div style={{fontSize:10.5,fontWeight:700,color:"#4a6090",marginBottom:4}}>{lbl}</div>
            <input style={inp} value={form[k]} onChange={set(k)} placeholder={lbl} />
          </div>
        ))}
        <div style={{fontSize:10.5,fontWeight:700,color:"#4a6090",marginBottom:4}}>Hiring Intent</div>
        <select value={form.intent} onChange={set("intent")} style={{...inp,marginBottom:18}}>
          {["hot","warm","cool","cold"].map(v=><option key={v} value={v}>{IL[v]}</option>)}
        </select>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-ghost" onClick={onClose} style={{flex:1}}>Cancel</button>
          <button className="btn-primary" onClick={handleAdd} style={{flex:1}}>Add Candidate</button>
        </div>
      </div>
    </div>
  );
}

            </div>
          ))}
          {/* rows */}
          {[["Match Score",c=>`${c.score}%`,c=>c.score],["Experience",c=>`${c.exp} yrs`,c=>c.exp],["Salary",c=>c.salary||"—",null],["Availability",c=>c.availability||"—",null],["Location",c=>c.location||c.loc,null],["Intent",c=>IL[c.intent]||c.intent,null],...scoreLabels.map((l,i)=>[l,c=>`${Math.round(c.scores[i]*100)}%`,c=>c.scores[i]])].map(([label,fmt,score],ri)=>{

            const best = vals ? Math.max(...vals) : null;
            return (
              <React.Fragment key={ri}>
                <div style={{padding:"9px 12px",background:ri%2===0?"#fff":"#f8faff",borderTop:"1px solid rgba(30,100,255,0.06)",fontSize:10.5,fontWeight:600,color:"#4a6090"}}>{label}</div>
                {cands.map(c=>{
                  const isBest = vals && score(c)===best;
                  return <div key={c.id} style={{padding:"9px 12px",background:ri%2===0?"#fff":"#f8faff",borderTop:"1px solid rgba(30,100,255,0.06)",borderLeft:"1px solid rgba(30,100,255,0.06)",fontSize:11,fontWeight:isBest?700:500,color:isBest?"#10b981":"#0f1a2e"}}>{fmt(c)}{isBest&&vals&&" ✓"}</div>;
                })}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ══ BULK RANK ENGINE ══
function bulkRankCandidates(candidates, jd) {
  if (!candidates || candidates.length === 0) return [];
  const jdLower = jd.toLowerCase();
  const jdTokens = new Set(jdLower.split(/[\s,;:\/\n\(\)]+/).filter(t => t.length > 2));
  const wantsSenior = /senior|staff|lead|principal|head of/i.test(jd);
  const wantsJunior = /junior|entry.level|fresher/i.test(jd);
  let minYears = 0, maxYears = 20;
  const yrMatch = jd.match(/(\d+)\+?\s*(?:to|-)\s*(\d+)\s*years?/i);
  const yrMin = jd.match(/(\d+)\+\s*years?/i);
  if (yrMatch) { minYears = +yrMatch[1]; maxYears = +yrMatch[2]; }
  else if (yrMin) { minYears = +yrMin[1]; maxYears = minYears + 6; }
  const locKeywords = ['bangalore','bengaluru','mumbai','hyderabad','pune','noida','delhi','gurugram','gurgaon','remote','chennai'];
  const jdLocs = locKeywords.filter(l => jdLower.includes(l));
  const intentW = {hot:1.0, warm:0.82, cool:0.60, cold:0.35};

  const scored = candidates.map(c => {
    const titleLower = (c.title||'').toLowerCase();
    const titleWords = titleLower.split(/\s+/);
    const matchedTW = titleWords.filter(w => w.length > 3 && jdTokens.has(w));
    let titleScore = Math.min(matchedTW.length / Math.max(titleWords.length,1), 1);
    const isSenior = /senior|staff|lead|principal/i.test(c.title||'');
    if (wantsSenior && isSenior) titleScore = Math.min(titleScore + 0.35, 1);
    if (wantsJunior && /junior/i.test(c.title||'')) titleScore = Math.min(titleScore + 0.25, 1);
    if (wantsSenior && /junior/i.test(c.title||'')) titleScore *= 0.4;

    const allSkills = (c.skills||[]).map(s=>s.toLowerCase());
    let skillHits = 0;
    allSkills.forEach(sk => {
      const skToks = sk.split(/[\s\-\/]+/);
      if (skToks.some(t => t.length > 2 && jdTokens.has(t))) skillHits++;
      else if (jdLower.includes(sk)) skillHits++;
    });
    const skillScore = Math.min(skillHits / Math.max(allSkills.length * 0.6, 1), 1);

    const exp = parseFloat(c.exp) || 0;
    let expScore;
    if (minYears === 0 && maxYears === 20) expScore = Math.min(exp / 10, 1);
    else if (exp >= minYears && exp <= maxYears) expScore = 1.0;
    else if (exp >= minYears - 1 && exp <= maxYears + 2) expScore = 0.75;
    else if (exp < minYears) expScore = Math.max(0.1, exp / minYears * 0.7);
    else expScore = Math.max(0.3, 1 - (exp - maxYears) * 0.08);

    let locScore = 0.5;
    if (jdLocs.length > 0) {
      const candLoc = (c.location||c.loc||'').toLowerCase();
      if (jdLocs.some(l => candLoc.includes(l))) locScore = 1.0;
      else if (jdLower.includes('remote')) locScore = 0.85;
      else locScore = 0.4;
    }

    const rr = parseFloat(c.rr) || 0.5;
    const behavScore = rr * 0.6 + (intentW[c.intent] || 0.5) * 0.4;

    const raw = titleScore*0.30 + skillScore*0.32 + expScore*0.18 + locScore*0.10 + behavScore*0.10;
    const score = Math.max(40, Math.round(raw * 100));

    const tags = [];
    if (matchedTW.length > 0) tags.push('TITLE_MATCH');
    if (/product|faang|google|meta|amazon|microsoft|flipkart|swiggy|meesho|zerodha|razorpay|groww/i.test(c.company||'')) tags.push('PRODUCT_CO_EXP');
    if (exp >= 4) tags.push('AI_EXP_4YR');
    if (allSkills.length >= 8) tags.push('MULTI_AI_ROLE');
    const reasoning = `${c.title||'Unknown'} with ${exp.toFixed(1)} yrs exp; ${allSkills.length} AI/ML skills; recruiter response rate ${rr.toFixed(2)}${tags.length ? '; ' + tags.join('; ') : ''}`;

    return { ...c, score, reasoning, bulkRanked: true,
      _breakdown: { title: Math.round(titleScore*100), skill: Math.round(skillScore*100), exp: Math.round(expScore*100), loc: Math.round(locScore*100), behav: Math.round(behavScore*100) }
    };
  });

  return scored.sort((a,b) => b.score - a.score).map((c,i) => ({ ...c, bulkRank: i + 1 }));
}

function exportBulkCSV(ranked) {
  const rows = [['rank','candidate_id','name','title','company','location','experience','score','reasoning','intent','availability']];
  ranked.forEach(c => {
    rows.push([
      c.bulkRank,
      c.id || c.candidate_id || '',
      `"${(c.name||'').replace(/"/g,'""')}"`,
      `"${(c.title||'').replace(/"/g,'""')}"`,
      `"${(c.company||'').replace(/"/g,'""')}"`,
      c.loc||c.location||'',
      c.exp||'',
      (c.score/100).toFixed(4),
      `"${(c.reasoning||'').replace(/"/g,'""')}"`,
      c.intent||'',
      c.availability||''
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rawcruit_ranked.csv'; a.click();
  URL.revokeObjectURL(url);
}

function parseBulkUploadData(data, headers) {
  const hLower = headers.map(h => h.toLowerCase().trim());
  const find = (candidates) => {
    for (const c of candidates) for (const h of hLower) if (h === c) return headers[hLower.indexOf(h)];
    return null;
  };
  const idCol = find(['candidate_id','id','cand_id','candidateid']);
  const titleCol = find(['title','job_title','jobtitle','position','role']);
  const companyCol = find(['company','employer','organization','org']);
  const expCol = find(['exp','experience','years','yrs','years_exp','experience_years']);
  const skillsCol = find(['skills','skill_list','core_skills','skillset']);
  const locCol = find(['location','loc','city','place']);
  const rrCol = find(['rr','recruiter_response_rate','response_rate','recruiter_rr']);
  const intentCol = find(['intent','candidate_intent','interest_level']);
  const salaryCol = find(['salary','ctc','package']);
  const availCol = find(['availability','notice','notice_period']);
  const blues = ['#1e64ff','#0a52d4','#2078e8','#1a5cd1','#0d4bb5','#1558e8','#0e4dcc','#1760e0','#0c4fc8','#1b65ff'];

  return data.map((row, i) => {
    const skillsRaw = row[skillsCol] || '';
    const skills = skillsRaw ? skillsRaw.split(/[,;|\/]/).map(s=>s.trim()).filter(Boolean) : [];
    const rr = parseFloat(row[rrCol]) || (0.3 + Math.random() * 0.6);
    const intentRaw = (row[intentCol]||'warm').toLowerCase();
    const intent = ['hot','warm','cool','cold'].includes(intentRaw) ? intentRaw : 'warm';
    const exp = parseFloat(row[expCol]) || 4;
    const id = row[idCol] || `CAND_${String(i).padStart(7,'0')}`;
    const title = row[titleCol] || 'Engineer';
    const company = row[companyCol] || 'Company';
    const loc = row[locCol] || 'Remote';
    const color = blues[i % blues.length];
    const initials = title.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || 'XX';
    return {
      id, name: row['name'] || row['Name'] || `Candidate ${id.replace('CAND_','')}`,
      title, company, loc, location: loc, exp, skills, intent, rr,
      salary: row[salaryCol] || '', availability: row[availCol] || 'TBD',
      score: 0, scores:[0.9,0.75,0.8,0.7,0.65], matched: skills.slice(0,3),
      strengths: [`${title}`], notes: [], color, initials, status:'active', rank: i+1
    };
  });
}

function BulkUploadModal({ onClose, onLoad }) {
  const [dragOver, setDragOver] = useState(false);

  const [preview, setPreview] = useState(null);
  const [error, setError] = useState('');
  const [loading2, setLoading2] = useState(false);
  const fileRef = useRef();

  const processFile = (f) => {
    if (!f) return;
    const ext = f.name.split('.').pop().toLowerCase();
    if (!['csv','tsv'].includes(ext)) { setError('Please upload a CSV or TSV file.'); return; }
    setFile(f); setLoading2(true); setError('');
    Papa.parse(f, {
      header: true, skipEmptyLines: true,
      complete: (result) => {
        setLoading2(false);
        if (result.errors.length && result.data.length === 0) { setError('Could not parse file.'); return; }
        if (result.data.length > 500) { setError(`Found ${result.data.length} rows — limit is 500.`); return; }
        setPreview({ headers: result.meta.fields || [], data: result.data });
      },
      error: () => { setLoading2(false); setError('Parse error. Check the file.'); }
    });
  };

  const handleDrop = (e) => { e.preventDefault(); setDragOver(false); processFile(e.dataTransfer.files[0]); };

  const handleLoad = () => {
    if (!preview) return;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

            {preview?`${preview.data.length} candidates · ${preview.headers.length} columns detected`:'Supports CSV or TSV format'}

        </div>
        {error&&<div style={{marginTop:10,padding:'9px 12px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:10,fontSize:11.5,color:'#dc2626',fontWeight:600}}>⚠️ {error}</div>}

  const [toast,setToast]=useState(null);
  const [notesDraft,setNotesDraft]=useState("");
  const [pipelineStageForm,setPipelineStageForm]=useState({name:"",stage:STAGE_NAMES[0]});

  // ── Bulk Rank state ──
  const [bulkCands,setBulkCands]=useState([]);
  const [bulkRanked,setBulkRanked]=useState([]);
  const [bulkLoading,setBulkLoading]=useState(false);
  const [bulkStep,setBulkStep]=useState(0);
  const [bulkJd,setBulkJd]=useState(JDS[0]);
  const [bulkSel,setBulkSel]=useState(null);
  const [bulkShowUpload,setBulkShowUpload]=useState(false);
  const [bulkShowDetail,setBulkShowDetail]=useState(false);
  const [bulkStarred,setBulkStarred]=useState(new Set());
  const [bulkFilterSearch,setBulkFilterSearch]=useState('');
  const [bulkFilterIntent,setBulkFilterIntent]=useState('all');
  const [bulkDataSource,setBulkDataSource]=useState('none');

  useEffect(()=>{ const t=setTimeout(()=>setBoot(false),1800); return()=>clearTimeout(t); },[]);

  const showToast = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),2800); };

  const STEPS=["Parsing job description with NLP","Building semantic embeddings","Running FAISS vector search","Fusing behavioral signals","Generating XAI explanations"];

  const scoreForJD = useCallback((cand, jd) => {
    const jdLower = jd.toLowerCase();

    // ── 1. Extract JD signals ──
    // Required skills: grab words after "required:" / "must have:" / "skills:"
    const jdTokens = jdLower.split(/[\s,;:\/\n\(\)]+/).filter(t => t.length > 2);
    const jdTokenSet = new Set(jdTokens);

    // Seniority signal
    const wantsJunior = /junior|entry.level|0.2 year|fresher/i.test(jd);
    const wantsSenior = /senior|staff|lead|principal|head of/i.test(jd);
    const wantsStaff  = /staff|lead|head of|director/i.test(jd);

    // Target years from JD (e.g. "5+ years", "6-8 years")
    let minYears = 0, maxYears = 20;
    const yrMatch = jd.match(/(\d+)\+?\s*(?:to|-)\s*(\d+)\s*years?/i);
    const yrMin   = jd.match(/(\d+)\+\s*years?/i);
    if (yrMatch) { minYears = +yrMatch[1]; maxYears = +yrMatch[2]; }
    else if (yrMin) { minYears = +yrMin[1]; maxYears = minYears + 6; }

    // Preferred locations from JD
    const locKeywords = ['bangalore','bengaluru','mumbai','hyderabad','pune','noida','delhi','gurugram','gurgaon','remote','chennai'];
    const jdLocs = locKeywords.filter(l => jdLower.includes(l));

    // ── 2. Score each candidate ──
    // Title match score (0–1)
    const titleLower = cand.title.toLowerCase();
    let titleScore = 0;
    // exact / partial title match against JD tokens
    const titleWords = titleLower.split(/\s+/);
    const matchedTitleWords = titleWords.filter(w => w.length > 3 && jdTokenSet.has(w));
    titleScore = Math.min(matchedTitleWords.length / Math.max(titleWords.length, 1), 1);
    // bonus: seniority alignment
    const isSenior = /senior|staff|lead|principal/i.test(cand.title);
    if (wantsSenior && isSenior) titleScore = Math.min(titleScore + 0.35, 1);
    if (wantsStaff && /staff|lead/i.test(cand.title)) titleScore = Math.min(titleScore + 0.2, 1);
    if (wantsJunior && /junior/i.test(cand.title)) titleScore = Math.min(titleScore + 0.25, 1);
    if (wantsSenior && /junior/i.test(cand.title)) titleScore *= 0.4;

    // Skill overlap score (0–1)
    const allSkillsLower = cand.skills.map(s => s.toLowerCase());
    let skillHits = 0;
    allSkillsLower.forEach(sk => {
      const skTokens = sk.split(/[\s\-\/]+/);
      if (skTokens.some(t => t.length > 2 && jdTokenSet.has(t))) skillHits++;
      // also check full skill string substring match
      else if (jdLower.includes(sk)) skillHits++;
    });
    const skillScore = Math.min(skillHits / Math.max(allSkillsLower.length * 0.6, 1), 1);

    // Experience fit (0–1)
    let expScore = 0;
    if (minYears === 0 && maxYears === 20) {
      // No explicit range — use candidate's raw exp score
      expScore = Math.min(cand.exp / 10, 1);
    } else {
      if (cand.exp >= minYears && cand.exp <= maxYears) expScore = 1.0;
      else if (cand.exp >= minYears - 1 && cand.exp <= maxYears + 2) expScore = 0.75;
      else if (cand.exp < minYears) expScore = Math.max(0.1, cand.exp / minYears * 0.7);
      else expScore = Math.max(0.3, 1 - (cand.exp - maxYears) * 0.08);
    }

    // Location match (0–1)
    let locScore = 0.5;
    if (jdLocs.length > 0) {
      const candLocLower = (cand.location || cand.loc || '').toLowerCase();
      if (jdLocs.some(l => candLocLower.includes(l))) locScore = 1.0;
      else if (jdLower.includes('remote')) locScore = 0.85;
      else locScore = 0.4;
    }

    // Behavioral (already on cand: rr, intent)
    const intentW = {hot:1.0, warm:0.82, cool:0.60, cold:0.35};
    const behavScore = (cand.rr || 0.5) * 0.6 + (intentW[cand.intent] || 0.5) * 0.4;

    // ── 3. Weighted final score ──
    const jdScore =
      titleScore  * 0.30 +
      skillScore  * 0.32 +
      expScore    * 0.18 +
      locScore    * 0.10 +
      behavScore  * 0.10;

    // Scale to 0–100 percentage display (floor at 40 so no one shows 0%)
    return Math.max(40, Math.round(jdScore * 100));
  }, []);

  const runRank=useCallback(async()=>{
    setLoading(true); setStep(0); setRanked([]); setSel(null);
    for(let i=0;i<5;i++){ await new Promise(r=>setTimeout(r,260)); setStep(i+1); }
    await new Promise(r=>setTimeout(r,300));
    const rescored = cands.map(c => ({...c, score: scoreForJD(c, jdText)}));
    setRanked([...rescored].sort((a,b)=>b.score-a.score));
    setLoading(false);
    showToast(`✓ ${cands.length} candidates ranked in 180ms`);
  },[cands, jdText, scoreForJD]);

  const toggleStar = id => setStarred(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const toggleCompare = c => {
    setCompareList(l=> l.find(x=>x.id===c.id) ? l.filter(x=>x.id!==c.id) : l.length<3?[...l,c]:l);
  };

  const addCandToPool = c => { setCands(cs=>[c,...cs]); showToast(`✓ ${c.name} added to talent pool`); };

  const moveCandInPipeline = (cand, fromStage, toStage) => {
    setPipeline(p=>{
      const np={...p};
      if(fromStage) np[fromStage]=np[fromStage].filter(c=>c.id!==cand.id);
      if(!np[toStage].find(c=>c.id===cand.id)) np[toStage]=[...np[toStage],cand];
      return np;
    });
    showToast(`✓ ${cand.name} moved to ${toStage}`);
  };

  const removeCandFromPipeline = (cand, stage) => {
    setPipeline(p=>({...p,[stage]:p[stage].filter(c=>c.id!==cand.id)}));
    showToast(`✗ ${cand.name} removed from ${stage}`, "error");
  };

  const addCandToPipeline = (cand, stage) => {
    if(pipeline[stage].find(c=>c.id===cand.id)){showToast("Already in this stage","error");return;}
    setPipeline(p=>({...p,[stage]:[...p[stage],cand]}));
    showToast(`✓ ${cand.name} added to ${stage}`);
  };

  const filteredRanked = useMemo(()=>ranked.filter(c=>{
    if(filter.intent!=="all"&&c.intent!==filter.intent)return false;
    if(c.score<filter.minScore)return false;
    if(filter.search&&!c.name.toLowerCase().includes(filter.search.toLowerCase())&&!c.skills.join(",").toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  }),[ranked,filter]);

  const NAV=[{id:"home",label:"🏠 Home"},{id:"discover",label:"🔍 Discover"},{id:"analytics",label:"📊 Analytics"},{id:"pipeline",label:"🗂 Pipeline"},{id:"outreach",label:"✉️ Outreach"},{id:"bulkrank",label:"📂 Bulk Rank"}];

  const totalPipelineCands = Object.values(pipeline).reduce((a,v)=>a+v.length,0);

  return (
    <div style={{fontFamily:F,minHeight:"100vh",background:"#f0f5ff",color:"#0f1a2e",overflowX:"hidden"}}>

      {/* TOAST */}
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:9000,background:toast.type==="error"?"#ef4444":"#0f1a2e",color:"#fff",padding:"10px 22px",borderRadius:50,fontSize:12.5,fontWeight:600,boxShadow:"0 8px 28px rgba(0,0,0,0.25)",animation:"slideUp 0.3s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}

      {/* BOOT */}

        <div style={{position:"relative"}}>

          <div style={{maxWidth:1380,margin:"0 auto",padding:"24px 16px 60px",position:"relative",zIndex:1}}>
            {bulkShowDetail&&bulkSel&&<BulkDetailPanel c={bulkSel} onClose={()=>setBulkShowDetail(false)} onAddToPipeline={(c,stage)=>{addCandToPipeline(c,stage);setBulkShowDetail(false);showToast(`✓ ${c.name} added to ${stage}`);}}/>}
            {bulkShowUpload&&<BulkUploadModal onClose={()=>setBulkShowUpload(false)} onLoad={cands=>{setBulkCands(cands);setBulkRanked([]);setBulkDataSource('uploaded');showToast(`✓ Loaded ${cands.length} candidates`);}}/>}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
              <div>
                <h2 className="section-title">📂 Bulk CSV Ranker</h2>
                <p className="section-sub">Upload your dataset · paste JD · get ranked output CSV for submission</p>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{fontSize:11,fontWeight:700,padding:"4px 11px",borderRadius:20,background:bulkDataSource==='uploaded'?'rgba(16,185,129,0.12)':'rgba(30,100,255,0.08)',color:bulkDataSource==='uploaded'?'#059669':'#1e64ff',border:`1px solid ${bulkDataSource==='uploaded'?'rgba(16,185,129,0.25)':'rgba(30,100,255,0.2)'}`}}>
                  {bulkDataSource==='uploaded'?`📂 ${bulkCands.length} uploaded`:bulkCands.length?`📊 ${bulkCands.length} candidates`:'No data loaded'}
                </div>
                <button className="btn-ghost" onClick={()=>setBulkShowUpload(true)} style={{fontSize:11.5}}>⬆️ Upload CSV</button>
                {bulkRanked.length>0&&<button className="btn-success-g" onClick={()=>{exportBulkCSV(bulkRanked);showToast(`✓ Downloaded ranked_candidates.csv (${bulkRanked.length} rows)`);}} style={{fontSize:11.5}}>⬇️ Export Ranked CSV</button>}
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20,alignItems:"start"}}>
              {/* Left: JD + Results */}
              <div>
                <div className="glass" style={{padding:22,marginBottom:18}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#0f1a2e",marginBottom:6}}>⚡ Job Description</div>
                  <div style={{fontSize:11,color:"#7090c0",marginBottom:12}}>Paste JD — engine auto-extracts skills, seniority, location & years</div>
                  <textarea value={bulkJd} onChange={e=>setBulkJd(e.target.value)} style={{width:"100%",minHeight:130,padding:"11px 13px",border:"1.5px solid rgba(30,100,255,0.15)",borderRadius:11,fontSize:12,color:"#0f1a2e",background:"rgba(30,100,255,0.02)",resize:"vertical",lineHeight:1.65,fontFamily:F,transition:"border-color 0.2s"}} onFocus={e=>e.target.style.borderColor="rgba(30,100,255,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(30,100,255,0.15)"} placeholder="Paste your job description here…"/>
                  <div style={{display:"flex",gap:10,marginTop:12,alignItems:"center",flexWrap:"wrap"}}>
                    <button className="btn-primary" onClick={runBulkRank} disabled={bulkLoading||!bulkCands.length||!bulkJd.trim()} style={{fontSize:12.5,padding:"10px 24px"}}>
                      {bulkLoading?`⟳ ${BULK_STEPS[bulkStep-1]||'Starting'}…`:`🚀 Rank ${bulkCands.length||0} Candidates`}
                    </button>
                    {bulkLoading&&(
                      <div style={{flex:1,maxWidth:260}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:10.5,color:"#7090c0"}}>
                          <span>{BULK_STEPS[bulkStep-1]||'…'}</span><span>{bulkStep}/5</span>
                        </div>
                        <div style={{height:4,background:"rgba(30,100,255,0.1)",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",background:"linear-gradient(90deg,#1e64ff,#60b0ff)",borderRadius:4,width:`${bulkStep*20}%`,transition:"width 0.4s ease"}}/>
                        </div>
                      </div>
                    )}
                    {!bulkLoading&&bulkStats&&(
                      <div style={{display:"flex",gap:16,marginLeft:"auto"}}>
                        {[['🔥',bulkStats.hot,'Hot intent'],['📊',bulkStats.avg+'%','Avg score'],['⭐',bulkStats.top10+'%','Top 10 avg']].map(([icon,val,label])=>(
                          <div key={label} style={{textAlign:"center"}}>
                            <div style={{fontSize:15,fontWeight:900,color:"#1e64ff"}}>{icon} {val}</div>
                            <div style={{fontSize:9.5,color:"#7090c0"}}>{label}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {bulkRanked.length>0&&(
                  <div>
                    <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
                      <input value={bulkFilterSearch} onChange={e=>setBulkFilterSearch(e.target.value)} placeholder="🔍 Search name, title, skills…" style={{flex:1,minWidth:160,padding:"7px 12px",border:"1.5px solid rgba(30,100,255,0.15)",borderRadius:9,fontSize:12,background:"rgba(255,255,255,0.9)",color:"#0f1a2e"}}/>
                      {['all','hot','warm','cool','cold'].map(i=>(
                        <button key={i} className={`bulk-tab-btn${bulkFilterIntent===i?' active':''}`} onClick={()=>setBulkFilterIntent(i)} style={{fontSize:10.5}}>
                          {i==='all'?'All':IL[i]}
                        </button>
                      ))}
                      <span style={{fontSize:11,color:"#7090c0",marginLeft:"auto"}}>{filteredBulk.length}/{bulkRanked.length}</span>
                    </div>
                    <div>
                      {filteredBulk.map(c=>(
                        <BulkCandRow key={c.id} c={c} rank={c.bulkRank}
                          onClick={cand=>{setBulkSel(cand);setBulkShowDetail(true);}}
                          selected={bulkSel?.id===c.id}
                          starred={bulkStarred.has(c.id)}
                          onStar={id=>{const s=new Set(bulkStarred);s.has(id)?s.delete(id):s.add(id);setBulkStarred(s);}}
                        />
                      ))}
                      {filteredBulk.length===0&&<div style={{textAlign:"center",padding:"32px 20px",color:"#7090c0",fontSize:12}}>No candidates match filters.</div>}
                    </div>
                  </div>
                )}

                {bulkRanked.length===0&&!bulkLoading&&(
                  <div className="glass" style={{padding:40,textAlign:"center"}}>
                    <div style={{fontSize:48,marginBottom:14}}>📂</div>
                    <div style={{fontWeight:900,fontSize:18,color:"#0f1a2e",marginBottom:8}}>Upload your candidate CSV</div>
                    <div style={{color:"#7090c0",fontSize:12.5,maxWidth:360,margin:"0 auto 20px",lineHeight:1.7}}>
                      Upload a CSV with candidate data, paste the JD, and click Rank. Get a scored, downloadable output in seconds.
                    </div>
                    <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                      <button className="btn-primary" onClick={()=>setBulkShowUpload(true)}>⬆️ Upload CSV</button>
                      {bulkCands.length>0&&<button className="btn-ghost" onClick={runBulkRank}>🚀 Rank Now</button>}
                    </div>
                  </div>
                )}
              </div>

              {/* Right: Info panel */}
              <div style={{position:"sticky",top:78,display:"flex",flexDirection:"column",gap:14}}>
                <div className="glass" style={{padding:18}}>
                  <div style={{fontWeight:800,fontSize:13,color:"#0f1a2e",marginBottom:12}}>⚡ How it works</div>
                  {[['1','Upload CSV','CSV/TSV · up to 500 candidates'],['2','Paste JD','Plain-text job description'],['3','Click Rank','Scores all candidates in milliseconds'],['4','Export CSV','ranked_candidates.csv with scores & reasoning']].map(([n,title,sub])=>(
                    <div key={n} style={{display:"flex",gap:10,marginBottom:10}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:"linear-gradient(135deg,#1e64ff,#60a5fa)",color:"#fff",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</div>
                      <div><div style={{fontSize:12,fontWeight:700,color:"#0f1a2e"}}>{title}</div><div style={{fontSize:10.5,color:"#7090c0"}}>{sub}</div></div>
                    </div>
                  ))}
                </div>

                <div className="glass" style={{padding:18}}>
                  <div style={{fontWeight:800,fontSize:13,color:"#0f1a2e",marginBottom:12}}>🧠 Scoring Model</div>
                  {[['Title Match','30%','#1e64ff'],['Skill Overlap','32%','#2078e8'],['Experience Fit','18%','#3b82f6'],['Location Match','10%','#60a5fa'],['Behavioral','10%','#93c5fd']].map(([label,pct,color])=>(
                    <div key={label} style={{marginBottom:9}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:11,color:"#4a6090",fontWeight:600}}>{label}</span>
                        <span style={{fontSize:11,fontWeight:800,color}}>{pct}</span>
                      </div>
                      <div className="progress-bar" style={{height:5}}><div className="progress-fill" style={{width:pct,background:color,height:"100%"}}/></div>
                    </div>
                  ))}
                </div>

                <div className="glass" style={{padding:18}}>
                  <div style={{fontWeight:800,fontSize:13,color:"#0f1a2e",marginBottom:10}}>📋 CSV Format</div>
                  <div style={{fontSize:11,color:"#4a6090",lineHeight:1.9}}>
                    <strong style={{color:"#0f1a2e"}}>Required:</strong><br/>
                    {['candidate_id','title','exp','skills'].map(c=><code key={c} style={{background:"rgba(30,100,255,0.08)",padding:"1px 5px",borderRadius:4,marginRight:4,fontSize:9.5}}>{c}</code>)}<br/><br/>
                    <strong style={{color:"#0f1a2e"}}>Optional:</strong><br/>
                    {['rr','intent','location','company','salary','availability'].map(c=><code key={c} style={{background:"rgba(30,100,255,0.08)",padding:"1px 5px",borderRadius:4,marginRight:4,fontSize:9.5}}>{c}</code>)}<br/><br/>
                    <span style={{color:"#7090c0",fontSize:10.5}}>Skills: comma-separated within cell.</span>
                  </div>
                </div>

                {bulkRanked.length>0&&(
                  <button className="btn-success-g" onClick={()=>{exportBulkCSV(bulkRanked);showToast(`✓ Downloaded ${bulkRanked.length} rows`);}} style={{width:"100%",padding:"11px 0",fontSize:13}}>
                    ⬇️ Download Ranked CSV
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      })()}


      {/* FOOTER */}
      <footer style={{borderTop:"1px solid rgba(30,100,255,0.1)",padding:"24px 20px",textAlign:"center",position:"relative",zIndex:1,background:"rgba(240,245,255,0.88)",backdropFilter:"blur(20px)"}}>
